endpoint: frames
extends: node
domain: creation
description: "Create and manage frames, shapes, auto-layout containers, sections, and SVG nodes."
description_zh: "创建和管理框架、形状、自动布局容器、分区和 SVG 节点。"

notes: |
  // Frames are the primary container in Figma. Use auto_layout for responsive containers.
  // Sizing: FIXED = explicit size, HUG = shrink to children, FILL = expand to fill parent.
  // Fill: prefer fillVariableName/fillStyleName. Use fills:[{type:"SOLID", color:"#hex"}] or gradient Paint[] (GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND) with gradientTransform + gradientStops only for one-off values; [] for transparent. Shorthand: fillColor:"#3B82F6" (auto-binds single solids).
  // Also: fillVariableName:"bg/surface", fillStyleName:"Surface/Primary". Do not use CSS gradients, REST gradientHandlePositions, or top-level gradient boundVariables.
  // Image fill: use imageUrl/images for image authoring. imageUrl accepts "pexel:<id>", a public URL, or a local file path. SVGs become vector nodes; raster images become IMAGE fills. IMAGE/VIDEO/PATTERN may appear in readback metadata only; do not pass those objects in Paint[]. imageScaleMode: FILL (default), FIT, CROP, TILE.
  // Stroke: prefer strokeVariableName/strokeStyleName. Use strokes:[{type:"SOLID", color:"#hex"}] or gradient Paint[] (GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND) with gradientTransform + gradientStops only for one-off values; [] to clear. Shorthand: strokeColor:"#000", strokeVariableName:"border/default".
  // Token fields (cornerRadius, opacity, itemSpacing, padding, strokeWeight): pass number for value, string for variable name/ID.
  // Examples assume design tokens/styles already exist. Prefer token names (fillVariableName, strokeVariableName, padding:"space/16", cornerRadius:"radius/8") over raw values in production designs.
  // ---
  // SIZING: Always think about both axes. Containers with text need a width constraint — set width + layoutSizingHorizontal:"FIXED".
  //   HUG/HUG is only correct for intrinsically-sized elements (buttons, badges, icons).
  //   Smart defaults inside auto-layout parent: cross-axis defaults to FILL, primary axis stays HUG.
  //   FILL only works inside an auto-layout parent. Use FIXED for top-level frames.
  // minWidth/maxWidth/minHeight/maxHeight: responsive constraints for auto-layout children.
  // clipsContent: true (default) clips children to the frame bounds. Set false for overflow-visible.
  // Sections are top-level organizers (like artboards) — they cannot be nested inside frames.
  // Shape primitives: rectangle, ellipse, line — for decorative/visual elements (not containers).
  // group: wraps existing nodes into a Group. boolean_operation: UNION/SUBTRACT/INTERSECT/EXCLUDE combines shapes.
  // SVG create: pass raw SVG markup string (e.g. "<svg>...</svg>") — Figma converts it to vector nodes.

methods:
  create:
    tier: create
    description: Create frame-like containers
    example: 'frames(method:"create", type:"rectangle", items:[{name:"Gradient Box", fills:[{type:"GRADIENT_LINEAR", gradientTransform:[[1,0,0],[0,1,0]], gradientStops:[{position:0,color:"#FF6B6B"},{position:1,color:"#FFD93D"}]}]}])'
    discriminant: type
    types:
      frame:
        description: General-purpose frame — shrinks to content by default, static when width+height given
        example: 'frames(method:"create", type:"frame", items:[{name:"Dashboard Shell", x:0, y:0, width:1440, height:900, fillVariableName:"bg/canvas", children:[{type:"frame", name:"Content Area", x:80, y:80, width:640, height:360, layoutMode:"VERTICAL", padding:"space/24", itemSpacing:"space/12", fillVariableName:"bg/surface", cornerRadius:"radius/12", children:[{type:"text", name:"Dashboard overview", text:"Dashboard overview", textStyleName:"Heading/Medium", fontColorVariableName:"text/primary", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}]}]}])'
        params:
          $mixin: frame_params
          clipsContent: { type: boolean, coerce: true, optional: true }
          children: { $ref: inlineChildren }
      auto_layout:
        description: Auto-layout frame that arranges children automatically
        example: 'frames(method:"create", type:"auto_layout", items:[{name:"Settings Card", width:360, height:180, layoutMode:"VERTICAL", padding:"space/24", itemSpacing:"space/12", fillVariableName:"bg/surface", strokeVariableName:"border/subtle", strokeWeight:"stroke/1", cornerRadius:"radius/12", children:[{type:"text", name:"Team settings", text:"Team settings", textStyleName:"Heading/Medium", fontColorVariableName:"text/primary", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}, {type:"text", name:"Manage workspace preferences.", text:"Manage workspace preferences.", textStyleName:"Body/Regular", fontColorVariableName:"text/secondary", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}]}])'
        params:
          $mixin: frame_params
          layoutMode: { type: enum, values: [HORIZONTAL, VERTICAL], required: true, description: Primary axis direction }
          clipsContent: { type: boolean, coerce: true, optional: true }
          nodeIds: { type: "string[]", coerce: json, optional: true, description: "Existing node IDs to wrap into auto-layout" }
          children: { $ref: inlineChildren }
      section:
        description: Figma section (top-level organizer)
        example: 'frames(method:"create", type:"section", items:[{name:"Components", x:0, y:0, width:1200, height:800, fillVariableName:"bg/canvas"}])'
        params:
          name: { type: string, required: true, description: Section name }
          parentId: { $ref: parentId }
          x: { $ref: xPos }
          y: { $ref: yPos }
          width: { type: number, coerce: true, optional: true, description: "Width (default: 500)" }
          height: { type: number, coerce: true, optional: true, description: "Height (default: 500)" }
          fills: { $ref: paints, optional: true, description: "Fill Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] for transparent. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables; use imageUrl/images for image authoring. IMAGE/VIDEO/PATTERN may appear in readback metadata only" }
          fillColor: { $ref: color, optional: true, description: "Shorthand — sets a single solid fill (auto-binds to matching variable/style)" }
          fillStyleName: { type: string, optional: true, description: Paint style name for fill }
          fillVariableName: { type: string, optional: true, description: "Color variable by name e.g. 'bg/surface'" }
          imageUrl: { type: string, optional: true, description: "Image source — 'pexel:<id>', public URL, or local file path" }
          imageScaleMode: { type: enum, values: [FILL, FIT, CROP, TILE], optional: true, description: "How the image is scaled (default: FILL)" }
      rectangle:
        description: Rectangle shape node
        example: 'frames(method:"create", type:"rectangle", items:[{name:"Avatar Placeholder", width:64, height:64, cornerRadius:"radius/16", fillVariableName:"bg/muted"}])'
        params:
          name: { type: string, optional: true, description: "Layer name (default: 'Rectangle')" }
          parentId: { $ref: parentId }
          x: { $ref: xPos }
          y: { $ref: yPos }
          width: { type: number, coerce: true, optional: true, description: "Width in px (default: 100)" }
          height: { type: number, coerce: true, optional: true, description: "Height in px (default: 100)" }
          fills: { $ref: paints, optional: true, description: "Fill Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] for transparent. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables; use imageUrl/images for image authoring. IMAGE/VIDEO/PATTERN may appear in readback metadata only" }
          fillColor: { $ref: color, optional: true, description: "Shorthand — sets a single solid fill (auto-binds to matching variable/style)" }
          fillStyleName: { type: string, optional: true, description: Paint style name for fill }
          fillVariableName: { type: string, optional: true, description: "Color variable by name e.g. 'bg/surface'" }
          imageUrl: { type: string, optional: true, description: "Image source — 'pexel:<id>', public URL, or local file path" }
          imageScaleMode: { type: enum, values: [FILL, FIT, CROP, TILE], optional: true, description: "How the image is scaled (default: FILL)" }
          strokes: { $ref: paints, optional: true, description: "Stroke Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] to clear. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables. IMAGE/VIDEO/PATTERN may appear in readback metadata only" }
          strokeColor: { $ref: color, optional: true, description: "Shorthand — sets a single solid stroke (auto-binds to matching variable/style)" }
          strokeVariableName: { type: string, optional: true, description: "Color variable by name for stroke" }
          strokeWeight: { type: token, optional: true }
          cornerRadius: { $expand: corners, type: token }
          opacity: { type: token, optional: true }
          layoutSizingHorizontal: { type: enum, values: [FIXED, FILL], optional: true, description: "Horizontal sizing in auto-layout parent" }
          layoutSizingVertical: { type: enum, values: [FIXED, FILL], optional: true, description: "Vertical sizing in auto-layout parent" }
          annotations: { type: array, coerce: json, optional: true, description: "Annotations — [{label?, labelMarkdown?, properties?, categoryId?}]", items: { type: object } }
      ellipse:
        description: Ellipse/circle shape node
        example: 'frames(method:"create", type:"ellipse", items:[{name:"Status Dot", width:12, height:12, fillVariableName:"status/success"}])'
        params:
          name: { type: string, optional: true, description: "Layer name (default: 'Ellipse')" }
          parentId: { $ref: parentId }
          x: { $ref: xPos }
          y: { $ref: yPos }
          width: { type: number, coerce: true, optional: true, description: "Width in px (default: 100)" }
          height: { type: number, coerce: true, optional: true, description: "Height in px (default: 100, same as width for circle)" }
          fills: { $ref: paints, optional: true, description: "Fill Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] for transparent. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables; use imageUrl/images for image authoring. IMAGE/VIDEO/PATTERN may appear in readback metadata only" }
          fillColor: { $ref: color, optional: true, description: "Shorthand — sets a single solid fill (auto-binds to matching variable/style)" }
          fillStyleName: { type: string, optional: true, description: Paint style name for fill }
          fillVariableName: { type: string, optional: true, description: "Color variable by name e.g. 'bg/surface'" }
          imageUrl: { type: string, optional: true, description: "Image source — 'pexel:<id>', public URL, or local file path" }
          imageScaleMode: { type: enum, values: [FILL, FIT, CROP, TILE], optional: true, description: "How the image is scaled (default: FILL)" }
          strokes: { $ref: paints, optional: true, description: "Stroke Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] to clear. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables. IMAGE/VIDEO/PATTERN may appear in readback metadata only" }
          strokeColor: { $ref: color, optional: true, description: "Shorthand — sets a single solid stroke (auto-binds to matching variable/style)" }
          strokeVariableName: { type: string, optional: true, description: "Color variable by name for stroke" }
          strokeWeight: { type: token, optional: true }
          opacity: { type: token, optional: true }
          layoutSizingHorizontal: { type: enum, values: [FIXED, FILL], optional: true, description: "Horizontal sizing in auto-layout parent" }
          layoutSizingVertical: { type: enum, values: [FIXED, FILL], optional: true, description: "Vertical sizing in auto-layout parent" }
          annotations: { type: array, coerce: json, optional: true, description: "Annotations — [{label?, labelMarkdown?, properties?, categoryId?}]", items: { type: object } }
      line:
        description: Line shape node
        example: 'frames(method:"create", type:"line", items:[{name:"Divider", length:320, strokeVariableName:"border/subtle", strokeWeight:"stroke/1"}])'
        params:
          name: { type: string, optional: true, description: "Layer name (default: 'Line')" }
          parentId: { $ref: parentId }
          x: { $ref: xPos }
          y: { $ref: yPos }
          length: { type: number, coerce: true, optional: true, description: "Line length in px (default: 100)" }
          rotation: { type: number, coerce: true, optional: true, description: "Rotation in degrees (default: 0 = horizontal)" }
          strokes: { $ref: paints, optional: true, description: "Stroke Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] to clear. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables. IMAGE/VIDEO/PATTERN may appear in readback metadata only" }
          strokeColor: { $ref: color, optional: true, description: "Line color (default: black, auto-binds to matching variable/style)" }
          strokeVariableName: { type: string, optional: true, description: "Color variable by name for stroke" }
          strokeWeight: { type: token, optional: true, description: "Line thickness (default: 1)" }
          opacity: { type: token, optional: true }
          layoutSizingHorizontal: { type: enum, values: [FIXED, FILL], optional: true, description: "Horizontal sizing in auto-layout parent (defaults to FILL in vertical auto-layout)" }
          annotations: { type: array, coerce: json, optional: true, description: "Annotations — [{label?, labelMarkdown?, properties?, categoryId?}]", items: { type: object } }
      group:
        description: Group existing nodes together
        example: 'frames(method:"create", type:"group", items:[{nodeIds:["1:2","1:3"], name:"Icon Group"}])'
        params:
          nodeIds:
            type: string[]
            required: true
            description: "Node IDs to group (min 1)"
          name: { type: string, optional: true, description: "Group name" }
          parentId: { $ref: parentId }
      boolean_operation:
        description: Combine shapes with boolean operations (union, subtract, intersect, exclude)
        example: 'frames(method:"create", type:"boolean_operation", items:[{operation:"UNION", nodeIds:["1:2","1:3"], name:"Combined Shape", fillVariableName:"bg/accent"}])'
        params:
          $mixin: vector_style_params
          operation:
            type: enum
            values: [UNION, SUBTRACT, INTERSECT, EXCLUDE]
            required: true
            description: "Boolean operation type"
          nodeIds:
            type: string[]
            required: true
            description: "Node IDs to combine (min 2, first node is the base for SUBTRACT)"
          name: { type: string, optional: true, description: "Result node name" }
          parentId: { $ref: parentId }
      svg:
        description: Create node from SVG markup
        example: 'frames(method:"create", type:"svg", items:[{name:"Logo Mark", svg:"<svg width=\"24\" height=\"24\"><path d=\"M4 4h16v16H4z\" fill=\"currentColor\"/></svg>", fillVariableName:"icon/primary"}])'
        params:
          $mixin: vector_style_params
          svg: { type: string, required: true, description: SVG markup string }
          name: { type: string, optional: true, description: "Layer name (default: 'SVG')" }
          parentId: { $ref: parentId }
          x: { $ref: xPos }
          y: { $ref: yPos }
      slot:
        description: "Create a slot inside a component. Slots are placeholder containers that instance users fill with content. Defaults to VERTICAL auto-layout with FILL/HUG sizing — ready to receive children. Accepts all frame layout properties."
        example: 'frames(method:"create", type:"slot", items:[{componentId:"1:23", name:"Content Slot", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}])'
        params:
          $mixin: frame_params
          parentId: { type: string, optional: true, description: "Parent node ID inside the owning component. Required unless componentId is provided." }
          componentId: { type: string, optional: true, description: "Owning component ID. Optional — auto-resolved from parentId by walking up ancestors." }
    response:
      type: batch
      item: { id: { type: string } }

  commit:
    tier: edit
    description: "Commit a staged node — unwraps from [STAGED] container into the original target location."
    example: 'frames(method:"commit", id:"1:234")'
    params:
      id: { type: string, required: true, description: "Staged node ID to commit" }
    response:
      type: batch
      item: { id: { type: string } }

  export:
    tier: read
    description: "Export a node as PNG, JPG, SVG, SVG_STRING, or PDF"
    params:
      id:
        type: string
        required: true
        description: Node ID to export
      format:
        type: enum
        values: [PNG, JPG, SVG, SVG_STRING, PDF]
        optional: true
        description: "Export format (default: PNG). SVG_STRING returns raw SVG text."
      scale:
        type: number
        coerce: true
        optional: true
        description: "Export scale (default: 1, only for PNG/JPG)"
    response:
      type: object
      description: Binary image data returned as MCP image content (SVG_STRING returns text)
      properties:
        imageData: { type: string }
        mimeType: { type: string }
