endpoint: styles
domain: design-system
description: "CRUD for local paint, text, effect, and grid styles."
description_zh: "管理本地颜色、文字、效果和网格样式。"

notes: |
  // Styles are named, reusable design properties that can be applied to nodes. Four types:
  //   paint: named PaintStyle.paints (applied to fills/strokes), text: typography settings, effect: shadows/blurs, grid: layout grids.
  // All ID params accept both IDs and display names (case-insensitive). Use whichever you have.
  // ---
  // leadingTrim: "CAP_HEIGHT" trims line-height to cap height (tighter text boxes), "NONE" is default.
  // fontStyle: font variant name like "Bold", "Italic", "Bold Italic". Use fonts.list to find available styles.
  // Paint styles: create/update paints: Paint[] authoring accepts only SOLID and gradients (GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND).
  // Use gradientTransform + gradientStops; for a basic left-to-right gradient use gradientTransform:[[1,0,0],[0,1,0]]. Do not use CSS gradients, REST gradientHandlePositions, or top-level gradient boundVariables.
  // styles.get/list readback may include IMAGE/VIDEO/PATTERN metadata from existing Figma content, but those are readback-only and cannot be passed back to create/update Paint[] authoring. Use imageUrl/images for image authoring on nodes; VIDEO/PATTERN authoring is not supported here.
  // For VariableAlias ids in Paint[] (SOLID boundVariables.color or gradientStops[].boundVariables.color), inspect variables.get/list or variable_collections.get. Prefer colorVariableName/fillVariableName where available.
  // Backward-compatible color/colorVariableName create/update shorthands still create a single SOLID paint.
  //
  // Effect object shape (for effect styles):
  //   { type: "DROP_SHADOW"|"INNER_SHADOW"|"LAYER_BLUR"|"BACKGROUND_BLUR",
  //     color?: Color, offset?: {x, y}, radius: number, spread?: number,
  //     visible?: boolean, blendMode?: string }
  //   DROP_SHADOW/INNER_SHADOW require color, offset, radius. LAYER_BLUR/BACKGROUND_BLUR require radius only.
  //   Example: { type: "DROP_SHADOW", color: "#00000040", offset: {x:0,y:4}, radius: 8 }
  //
  // LayoutGrid object shape (for grid styles) follows Figma Plugin API conditional shapes:
  //   Grid: { pattern:"GRID", sectionSize:number, visible?:boolean, color?:Color }
  //   Rows/Columns: { pattern:"ROWS"|"COLUMNS", alignment?:"MIN"|"MAX"|"STRETCH"|"CENTER", gutterSize?:number, count?:number, offset?:number, sectionSize?:number, visible?:boolean, color?:Color }
  //   Important: alignment:"STRETCH" must omit sectionSize because Figma computes stretched row/column sizes. Use sectionSize only with fixed rows/columns (MIN/MAX/CENTER) or GRID.
  //   Examples: stretch columns {pattern:"COLUMNS", alignment:"STRETCH", count:12, gutterSize:24, offset:80}; fixed columns {pattern:"COLUMNS", alignment:"MIN", count:12, gutterSize:24, offset:80, sectionSize:72}; square grid {pattern:"GRID", sectionSize:8}.

methods:
  list:
    tier: read
    description: List local styles with optional type filter
    params:
      type:
        type: enum
        values: [paint, text, effect, grid]
        optional: true
        description: "Filter by style type"
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true }
          name: { type: string, required: true }
          type: { type: string, required: true }

  get:
    tier: read
    description: Get full style detail by ID
    params:
      id:
        type: string
        required: true
        description: "Style ID or name"
      fields:
        $ref: fields
    response:
      type: object
      properties:
        id: { type: string, required: true }
        name: { type: string, required: true }
        type: { type: string, required: true, description: "PAINT | TEXT | EFFECT | GRID" }
        paints: { type: paints, tsType: "Paint[]", description: "PaintStyle.paints for PAINT styles. Readback returns Figma Plugin API Paint[]; gradients include gradientTransform, gradientStops, opacity/blendMode, and stop boundVariables. Existing Figma content may return IMAGE/VIDEO/PATTERN metadata, but those are readback-only and cannot be passed to create/update Paint[] authoring, which accepts only SOLID and gradients." }
        boundVariables: { type: object, optional: true, description: "PaintStyle.boundVariables, e.g. {paints:[{type:'VARIABLE_ALIAS', id:'...'}]}" }
        fontFamily: { type: string, description: "Font family (TEXT styles)" }
        fontSize: { type: number, description: "Font size (TEXT styles)" }
        effects: { type: array, description: "Effects array (EFFECT styles)" }
        layoutGrids: { type: array, description: "Layout grids (GRID styles)" }
      required: [id, name, type]

  create:
    tier: create
    description: Create local styles
    example: 'styles(method:"create", type:"paint", items:[{name:"Gradient/Primary", paints:[{type:"GRADIENT_LINEAR", gradientTransform:[[1,0,0],[0,1,0]], gradientStops:[{position:0,color:"#7D58ED"},{position:1,color:"#207CE5"}]}]}])'
    discriminant: type
    types:
      paint:
        description: Paint/color style
        example: 'styles(method:"create", type:"paint", items:[{name:"Surface/Primary", colorVariableName:"bg/surface"}])'
        params:
          name: { type: string, required: true, description: Style name }
          paints: { $ref: paints, optional: true, description: "PaintStyle.paints authoring array. Accepts only SOLID and GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND, using gradientTransform + gradientStops, opacity/blendMode, and gradientStops[].boundVariables.color. Mutually exclusive with color/colorVariableName shorthands. Do not pass IMAGE/VIDEO/PATTERN, CSS gradients, REST gradientHandlePositions, or top-level gradient boundVariables. Use imageUrl/images for image authoring on nodes; VIDEO/PATTERN authoring is not supported here. For examples call styles(method:\"help\", topic:\"create\")." }
          color: { $ref: color, optional: true, description: "Single-solid shorthand color. Optional when colorVariableName or paints is provided." }
          colorVariableName: { type: string, optional: true, description: "Single-solid shorthand: bind to a COLOR variable by name (style tracks the variable). Can be used alone — color is resolved from the variable." }
          description: { type: string, optional: true, description: "Style description" }
      text:
        description: Text style
        example: 'styles(method:"create", type:"text", items:[{name:"Heading/Medium", fontFamily:"Inter", fontStyle:"Medium", fontSize:20, lineHeight:{value:28, unit:"PIXELS"}}, {name:"Body/Regular", fontFamily:"Inter", fontSize:14, lineHeight:{value:20, unit:"PIXELS"}}, {name:"Body/Medium", fontFamily:"Inter", fontStyle:"Medium", fontSize:14, lineHeight:{value:20, unit:"PIXELS"}}])'
        params:
          name: { type: string, required: true, description: Style name }
          fontFamily: { type: string, required: true, description: Font family }
          fontStyle: { type: string, optional: true, description: "Font style (default: Regular)" }
          fontSize: { type: number, coerce: true, required: true, description: Font size }
          lineHeight: { type: line_height, optional: true }
          letterSpacing: { type: letter_spacing, optional: true }
          textCase: { type: enum, values: [ORIGINAL, UPPER, LOWER, TITLE, SMALL_CAPS, SMALL_CAPS_FORCED], optional: true }
          textDecoration: { type: enum, values: [NONE, UNDERLINE, STRIKETHROUGH], optional: true }
          paragraphIndent: { type: number, coerce: true, optional: true, description: "Paragraph indent (px)" }
          paragraphSpacing: { type: number, coerce: true, optional: true, description: "Paragraph spacing (px)" }
          leadingTrim: { type: enum, values: [CAP_HEIGHT, NONE], optional: true, description: "Leading trim mode" }
          description: { type: string, optional: true, description: "Style description" }
      effect:
        description: Effect style
        example: 'styles(method:"create", type:"effect", items:[{name:"Shadow/Medium", effects:[{type:"DROP_SHADOW", color:"#00000040", offset:{x:0,y:4}, radius:8}]}])'
        params:
          name: { type: string, required: true, description: Style name }
          effects: { type: array, coerce: json, required: true, description: "Array of Effect objects" }
          description: { type: string, optional: true, description: "Style description" }
      grid:
        description: Grid/layout grid style
        example: 'styles(method:"create", type:"grid", items:[{name:"Grid/Desktop 12", layoutGrids:[{pattern:"COLUMNS", alignment:"STRETCH", count:12, gutterSize:24, offset:80}]}])'
        params:
          name: { type: string, required: true, description: Style name }
          layoutGrids: { type: array, coerce: json, required: true, description: "Array of LayoutGrid objects. Conditional shapes: GRID requires sectionSize and does not use alignment/count/gutterSize/offset; ROWS/COLUMNS use alignment/count/gutterSize/offset, and sectionSize only for fixed alignments MIN/MAX/CENTER. For alignment:STRETCH, omit sectionSize." }
          description: { type: string, optional: true, description: "Style description" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: Update styles by ID or name
    example: 'styles(method:"update", items:[{id:"Gradient/Primary", paints:[{type:"GRADIENT_LINEAR", gradientTransform:[[1,0,0],[0,1,0]], gradientStops:[{position:0,color:"#7D58ED"},{position:1,color:"#207CE5"}]}]}])'
    params:
      type:
        type: enum
        values: [paint, text, effect, grid]
        optional: true
        description: "Style type hint for strict validation (optional, auto-detected)"
      items:
        type: array
        coerce: json
        required: true
        tsType: "PatchStyleItem[]"
        description: "Array of {id, ...fields} to update"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Style ID or name" }
            name: { type: string, optional: true, description: Rename the style }
            description: { type: string, optional: true, description: "Style description" }
            paints: { $ref: paints, optional: true, description: "Replace PaintStyle.paints. Accepts only SOLID and GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND, using gradientTransform + gradientStops, opacity/blendMode, and gradientStops[].boundVariables.color. Mutually exclusive with color/colorVariableName. Do not pass IMAGE/VIDEO/PATTERN, CSS gradients, REST gradientHandlePositions, or top-level gradient boundVariables. Use imageUrl/images for image authoring on nodes; VIDEO/PATTERN authoring is not supported here. For examples call styles(method:\"help\", topic:\"update\")." }
            color: { $ref: color, optional: true, description: "New single-solid color shorthand (paint styles)" }
            colorVariableName: { type: string, optional: true, description: "Bind to a COLOR variable by name using single-solid shorthand (paint styles)" }
            fontFamily: { type: string, optional: true }
            fontStyle: { type: string, optional: true }
            fontSize: { type: number, coerce: true, optional: true }
            lineHeight: { type: line_height, optional: true }
            letterSpacing: { type: letter_spacing, optional: true }
            textCase: { type: enum, values: [ORIGINAL, UPPER, LOWER, TITLE, SMALL_CAPS, SMALL_CAPS_FORCED], optional: true }
            textDecoration: { type: enum, values: [NONE, UNDERLINE, STRIKETHROUGH], optional: true }
            paragraphIndent: { type: number, coerce: true, optional: true, description: "Paragraph indent (px)" }
            paragraphSpacing: { type: number, coerce: true, optional: true, description: "Paragraph spacing (px)" }
            leadingTrim: { type: enum, values: [CAP_HEIGHT, NONE], optional: true }
            effects: { type: array, coerce: json, optional: true, description: "Array of Effect objects" }
            layoutGrids: { type: array, coerce: json, optional: true, description: "Array of LayoutGrid objects (grid styles). Conditional shapes: GRID requires sectionSize and does not use alignment/count/gutterSize/offset; ROWS/COLUMNS use alignment/count/gutterSize/offset, and sectionSize only for fixed alignments MIN/MAX/CENTER. For alignment:STRETCH, omit sectionSize." }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete styles
    params:
      id:
        type: string
        optional: true
        description: "Style ID or name"
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{id}, ...]"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Style ID or name" }
    response:
      type: batch_ok
