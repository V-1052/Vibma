endpoint: variables
domain: design-system
description: "Search and update design variables within a collection."
description_zh: "搜索和更新集合中的设计变量。"

notes: |
  // Search and update variables within a collection. collectionId is required on all methods.
  // Use variable_collections to create full token sets (collection + modes + variables in one call).
  // ---
  // query: prefix match first, then substring. "bg/" matches bg/canvas, bg/surface, etc.
  // valuesByMode: values keyed by mode name. On create, value sets all modes; on update, value sets the default mode only.
  // Aliases in variable values use {type: "VARIABLE_ALIAS", name: "other/variable"}.
  // Paint[] VariableAlias uses {type:"VARIABLE_ALIAS", id:"<VariableID>"}; get IDs from variables.get/list or variable_collections.get. Prefer *VariableName helpers when available.
  // codeSyntax maps platform names to code references for developer handoff, e.g. {WEB:"--color-bg", ANDROID:"color.bg", iOS:"Color.bg"}.
  // scopes: ALL_SCOPES, TEXT_CONTENT, WIDTH_HEIGHT, GAP, CORNER_RADIUS, ALL_FILLS, FRAME_FILL, SHAPE_FILL,
  //   TEXT_FILL, STROKE_COLOR, STROKE_FLOAT, EFFECT_FLOAT, EFFECT_COLOR, OPACITY, FONT_FAMILY, FONT_STYLE,
  //   FONT_WEIGHT, FONT_SIZE, LINE_HEIGHT, LETTER_SPACING, PARAGRAPH_SPACING, PARAGRAPH_INDENT

methods:
  list:
    tier: read
    description: Search variables within a collection
    example: 'variables(method:"list", collectionId:"Tokens", query:"bg/")'
    params:
      collectionId:
        type: string
        required: true
        description: "Collection ID or name"
      query:
        type: string
        optional: true
        description: "Search query — prefix match first, then substring fallback"
      type:
        type: enum
        values: [COLOR, FLOAT, STRING, BOOLEAN]
        optional: true
        description: "Filter by variable type"
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true, description: "Figma VariableID. Use as VariableAlias.id in Paint[] when needed." }
          name: { type: string, required: true }
          type: { type: string, optional: true, description: "COLOR | FLOAT | STRING | BOOLEAN" }
          valuesByMode: { type: object, optional: true, description: "Values keyed by mode name" }
          scopes: { type: "string[]", optional: true }
          description: { type: string, optional: true }
          codeSyntax:
            type: object
            optional: true
            description: "Platform code syntax values"
            properties:
              WEB: { type: string, optional: true }
              ANDROID: { type: string, optional: true }
              iOS: { type: string, optional: true }

  get:
    tier: read
    description: Get variable detail by name
    params:
      name:
        type: string
        required: true
        description: "Variable name (unique within collection)"
      collectionId:
        type: string
        required: true
        description: "Collection ID or name"
      fields:
        $ref: fields
    response:
      type: object
      tsType: Variable
      properties:
        id: { type: string, required: true, description: "Figma VariableID. Use as VariableAlias.id in Paint[] when needed." }
        name: { type: string, required: true }
        type:
          type: enum
          values: [COLOR, FLOAT, STRING, BOOLEAN]
          required: true
        collectionId: { type: string, required: true, description: "Collection display name" }
        valuesByMode:
          type: object
          required: true
          tsType: "Record<string, number | boolean | string | Color | {type: \"VARIABLE_ALIAS\", name: string}>"
          description: "Values keyed by mode name (e.g. \"Light\", \"Dark\")"
        description: { type: string, description: "Variable description" }
        scopes:
          type: "string[]"
          description: "Where this variable can be applied"
        codeSyntax:
          type: object
          description: "Platform code syntax values, e.g. {WEB:\"--color-bg\", ANDROID:\"color.bg\", iOS:\"Color.bg\"}"
          properties:
            WEB: { type: string, optional: true }
            ANDROID: { type: string, optional: true }
            iOS: { type: string, optional: true }
      required: [id, name, type, collectionId, valuesByMode]

  create:
    tier: create
    description: "Create variables in a collection. Use valuesByMode for per-mode control, or value to set all modes at once."
    example: 'variables(method:"create", collectionId:"Tokens", items:[{name:"bg/warning", type:"COLOR", value:"#F59E0B", scopes:["ALL_FILLS"]}])'
    params:
      collectionId:
        type: string
        required: true
        description: "Collection ID or name"
      items:
        type: array
        coerce: json
        required: true
        tsType: "VariableCreateItem[]"
        description: "Array of variables to create"
        items:
          type: object
          properties:
            name: { type: string, required: true, description: "Variable name (must be unique within collection)" }
            type: { type: enum, values: [COLOR, FLOAT, STRING, BOOLEAN], required: true, description: "Variable type" }
            value: { type: variable_value, optional: true, description: "Sets all modes to this value. Use valuesByMode for per-mode control." }
            valuesByMode:
              type: object
              coerce: json
              optional: true
              description: 'Values keyed by mode name (e.g. {"Light": "#FFF", "Dark": "#111"}). Takes precedence over value.'
            description: { type: string, optional: true, description: "Variable description" }
            scopes: { type: "string[]", coerce: json, optional: true, description: "Restrict where variable can be applied (default: ALL_SCOPES)" }
            codeSyntax:
              type: object
              coerce: json
              optional: true
              passthrough: true
              description: 'Platform code syntax values for developer handoff, e.g. {"WEB":"--color-bg", "ANDROID":"color.bg", "iOS":"Color.bg"}'
              properties:
                WEB: { type: string, optional: true }
                ANDROID: { type: string, optional: true }
                iOS: { type: string, optional: true }
    response:
      type: batch
      item:
        id: { type: string, description: "Figma VariableID. Use as VariableAlias.id in Paint[] when needed." }
        name: { type: string, description: "Name of the created variable" }

  update:
    tier: edit
    description: "Update variable metadata and/or set values"
    example: 'variables(method:"update", collectionId:"Tokens", items:[{name:"bg/accent", value:"#1D4ED8"}])'
    params:
      collectionId:
        type: string
        required: true
        description: "Collection ID or name"
      items:
        type: array
        coerce: json
        required: true
        tsType: "VariableUpdateItem[]"
        description: "Array of variable updates"
        items:
          type: object
          properties:
            name: { type: string, required: true, description: "Variable name" }
            rename: { type: string, optional: true, description: "Rename the variable" }
            description: { type: string, optional: true, description: "Set description" }
            scopes: { type: "string[]", coerce: json, optional: true, description: "Update scopes" }
            value: { type: variable_value, optional: true, description: "Shorthand — sets the default mode value. Use valuesByMode for multi-mode." }
            valuesByMode:
              type: object
              coerce: json
              optional: true
              description: 'Values keyed by mode name. Takes precedence over value.'
            codeSyntax:
              type: object
              coerce: json
              optional: true
              passthrough: true
              description: 'Update platform code syntax values, e.g. {"WEB":"--color-bg"}. Pass an empty string to clear a platform.'
              properties:
                WEB: { type: string, optional: true }
                ANDROID: { type: string, optional: true }
                iOS: { type: string, optional: true }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete variables
    params:
      collectionId:
        type: string
        required: true
        description: "Collection ID or name"
      name:
        type: string
        optional: true
        description: Variable name
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{name}, ...]"
        items:
          type: object
          properties:
            name: { type: string, required: true }
    response:
      type: batch_ok
