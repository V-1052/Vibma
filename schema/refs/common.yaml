# Shared schema fragments — referenced via $ref: <name>

nodeId:
  type: string
  description: Node ID

parentId:
  type: string
  optional: true
  description: "Parent node ID. Omit to place at current page root."

depth:
  type: number
  coerce: true
  optional: true
  description: "Response detail: omit for id+name only. 0=properties + child stubs. N=recurse N levels. -1=unlimited."

xPos:
  type: number
  coerce: true
  optional: true
  description: "X position (default: 0)"

yPos:
  type: number
  coerce: true
  optional: true
  description: "Y position (default: 0)"

color:
  type: object
  coerce: hex_or_rgba
  description: 'Hex "#FF0000" or {r,g,b,a?} with values 0-1.'
  properties:
    r: { type: number, min: 0, max: 1 }
    g: { type: number, min: 0, max: 1 }
    b: { type: number, min: 0, max: 1 }
    a: { type: number, min: 0, max: 1, optional: true }

paints:
  type: paints
  coerce: json
  optional: true
  tsType: "Paint[]"
  description: >
    Paint[] authoring supports SOLID and Figma gradient paints only.
    Gradient types: GRADIENT_LINEAR, GRADIENT_RADIAL, GRADIENT_ANGULAR, GRADIENT_DIAMOND.
    SOLID supports color, opacity, blendMode, visible, and boundVariables.color.
    Gradients use gradientTransform + gradientStops; each stop supports position, color,
    and boundVariables.color. For a basic left-to-right gradient use
    gradientTransform:[[1,0,0],[0,1,0]]. Bind variables on gradientStops[].boundVariables.color
    (VariableAlias ids come from variables.get/list or variable_collections.get); do not use
    top-level gradient boundVariables. Do not use CSS gradient strings or REST gradientHandlePositions.
    Readback may include IMAGE/VIDEO/PATTERN metadata from existing Figma content, but those are
    readback-only and are not supported as authoring input here. Use imageUrl/images endpoint for
    image authoring. VIDEO/PATTERN authoring is not supported here.

effectEntry:
  type: object
  properties:
    type: { type: enum, values: [DROP_SHADOW, INNER_SHADOW, LAYER_BLUR, BACKGROUND_BLUR] }
    color: { $ref: color, optional: true }
    offset: { type: object, optional: true, properties: { x: { type: number }, y: { type: number } } }
    radius: { type: number }
    spread: { type: number, optional: true }
    visible: { type: boolean, coerce: true, optional: true }
    blendMode: { type: string, optional: true }

inlineChildren:
  type: array
  coerce: json
  optional: true
  description: >
    Inline child nodes — build nested trees in one call. Types:
    text: {type:"text", text, textStyleName?, fontColorVariableName?, layoutSizingHorizontal?}.
    frame: {type:"frame", name?, layoutMode?, fillVariableName?, itemSpacing?, layoutSizingHorizontal?, children?}.
    instance: {type:"instance", componentId, variantProperties?, properties?}.
    component: {type:"component", name, children?}.
    rectangle / ellipse / line: same params as the corresponding frames(method:"create", type:"rectangle"|"ellipse"|"line") branch.
    All params from text/frame endpoints are supported on their respective types.
    Inline fills/strokes accept Paint[] authoring input: SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops.
    Do not use CSS gradients, REST gradientHandlePositions, or IMAGE/VIDEO/PATTERN in Paint[] authoring.
    Always set layoutSizingHorizontal + layoutSizingVertical on children inside auto-layout parents (FILL, HUG, or FIXED).
    Example: children:[{type:"ellipse", name:"Dot", width:6, height:6, fillVariableName:"status/active"},
    {type:"text", name:"Title", text:"Title", textStyleName:"Heading/Medium",
    fontColorVariableName:"text/primary", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"},
    {type:"frame", name:"Row", layoutMode:"HORIZONTAL", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG", itemSpacing:"space/8",
    children:[{type:"instance", componentId:"1:2", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}]}]
    Inside components: add componentPropertyName to auto-bind TEXT or INSTANCE_SWAP properties.
  items:
    type: object

inlineChildrenComponent:
  type: array
  coerce: json
  optional: true
  description: >
    Inline child nodes — build nested trees in one call. Types:
    text: {type:"text", text, componentPropertyName?, textStyleName?, fontColorVariableName?, layoutSizingHorizontal?}.
    frame: {type:"frame", name?, layoutMode?, fillVariableName?, itemSpacing?, layoutSizingHorizontal?, children?}.
    instance: {type:"instance", componentId, componentPropertyName?, variantProperties?, properties?}.
    component: {type:"component", name, children?}.
    rectangle / ellipse / line: same params as the corresponding frames(method:"create", type:"rectangle"|"ellipse"|"line") branch.
    All params from text/frame endpoints are supported on their respective types.
    Inline fills/strokes accept Paint[] authoring input: SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops.
    Do not use CSS gradients, REST gradientHandlePositions, or IMAGE/VIDEO/PATTERN in Paint[] authoring.
    componentPropertyName auto-creates and binds a TEXT (text) or INSTANCE_SWAP (instance) property.
    Always set layoutSizingHorizontal + layoutSizingVertical on children inside auto-layout parents (FILL, HUG, or FIXED).
    Example: children:[{type:"ellipse", name:"Dot", width:6, height:6, fillVariableName:"status/active"},
    {type:"text", name:"Label", text:"Button", componentPropertyName:"Label",
    textStyleName:"Body/Medium", fontColorVariableName:"text/primary", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"},
    {type:"frame", name:"Actions", layoutMode:"HORIZONTAL", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG", itemSpacing:"space/8",
    children:[{type:"instance", componentId:"1:2", componentPropertyName:"Action", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}]}]
  items:
    type: object

inlineVariants:
  type: array
  coerce: json
  optional: true
  description: 'Inline variant components. Each must be {type:"component", name, children?, ...frame_params}. Variant children use the same inline child types as components.create, including rectangle / ellipse / line. All variants must share the same child structure. Alternative to componentIds — do not combine both.'
  items:
    type: object

fields:
  type: string[]
  coerce: json
  optional: true
  description: 'Property whitelist. Identity fields (id, name, type) always included. Omit for stubs on list, full on get. Pass ["*"] for all.'

offset:
  type: number
  coerce: true
  optional: true
  default: 0
  description: "Skip N items for pagination (default 0)"

limit:
  type: number
  coerce: true
  optional: true
  default: 100
  description: "Max items per page (default 100)"
