# Fill params — mirrors Figma's MinimalFillsMixin + custom aliases
# Include via $mixin: fill_params

fill_params:
  # MinimalFillsMixin (1-1 Figma API)
  fills: { $ref: paints, optional: true, description: "Fill Paint[] authoring — accepts only SOLID or GRADIENT_LINEAR/RADIAL/ANGULAR/DIAMOND with gradientTransform + gradientStops. [] for transparent. Do not use CSS gradients, REST gradientHandlePositions, IMAGE/VIDEO/PATTERN, or top-level gradient boundVariables; use imageUrl/images for image authoring. IMAGE/VIDEO/PATTERN may appear in readback metadata only. Primary way to set non-image fills." }
  # Custom aliases
  fillColor: { $ref: color, optional: true, description: "Shorthand — sets a single solid fill (auto-binds to matching variable/style)" }
  fillStyleName: { type: string, optional: true, description: "Paint style name for fill" }
  fillVariableName: { type: string, optional: true, description: "Color variable by name e.g. 'bg/surface'" }
  # Image fill
  imageUrl: { type: string, optional: true, description: "Image source — 'pexel:<id>' for Pexels photos, a public URL, or a local file path. SVGs are inserted as vectors; raster images become IMAGE fills." }
  imageScaleMode: { type: enum, values: [FILL, FIT, CROP, TILE], optional: true, description: "How the image is scaled within the frame (default: FILL)" }
